<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura Fitness | AI Coach & Smart Gym</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="AuraFitness.css" />
    <link rel="manifest" href="AuraFitness.js" />
  </head>
  <body class="pb-24">
    <header
      class="p-6 flex justify-between items-center sticky top-0 z-40 bg-[#0f172a]/80 backdrop-blur-md"
    >
      <div>
        <h1 class="logo-text text-2xl font-black tracking-tighter">AURA</h1>
        <p
          class="text-[10px] text-purple-400 uppercase tracking-widest font-bold"
        >
          Fitness Technology
        </p>
      </div>
      <div class="profile-ring p-0.5 rounded-full">
        <div
          class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center overflow-hidden"
        >
          <i data-lucide="user" class="text-slate-400"></i>
        </div>
      </div>
    </header>

    <main class="px-6 space-y-8 max-w-md mx-auto">
      <section class="glass rounded-[2rem] p-6">
        <div class="flex justify-between items-start mb-6">
          <div>
            <h2 class="text-lg font-bold">Affluenza Live</h2>
            <p class="text-sm text-slate-400">Palestra: Gold's Gym Roma</p>
          </div>
          <div
            class="flex items-center gap-1 bg-green-500/10 text-green-400 px-3 py-1 rounded-full text-xs font-bold animate-pulse"
          >
            <div class="w-2 h-2 bg-green-500 rounded-full"></div>
            Ora
          </div>
        </div>
        <div class="h-48">
          <canvas id="occupancyChart"></canvas>
        </div>
      </section>

      <section class="relative group">
        <div
          class="absolute -inset-1 bg-gradient-to-r from-purple-600 to-pink-600 rounded-[2rem] blur opacity-25 group-hover:opacity-50 transition duration-1000"
        ></div>
        <div class="relative glass rounded-[2rem] p-6">
          <div class="flex items-center gap-3 mb-4">
            <div class="p-3 bg-purple-600/20 rounded-2xl">
              <i data-lucide="sparkles" class="text-purple-400"></i>
            </div>
            <h2 class="text-xl font-bold">Aura AI Coach</h2>
          </div>
          <p class="text-slate-300 text-sm mb-6">
            Analizzo il tuo profilo e l'affluenza per generare il workout
            perfetto per te.
          </p>

          <button
            onclick="generateAIWorkout()"
            id="aiBtn"
            class="w-full bg-white text-slate-900 py-4 rounded-2xl font-bold hover:scale-[1.02] active:scale-95 transition-all shadow-xl flex items-center justify-center gap-2"
          >
            Genera Scheda Personalizzata
          </button>

          <div
            id="aiResponse"
            class="hidden mt-6 pt-6 border-t border-white/10 space-y-3"
          ></div>
        </div>
      </section>

      <section class="space-y-4">
        <div class="flex justify-between items-center">
          <h3 class="font-bold text-lg">Personal Trainer</h3>
          <a href="#" class="text-xs text-purple-400 font-bold uppercase"
            >Vedi tutti</a
          >
        </div>
        <div class="flex gap-4 overflow-x-auto pb-4 scroll-hide">
          <div
            class="min-w-[140px] glass p-4 rounded-3xl text-center border-b-4 border-purple-500"
          >
            <div
              class="w-16 h-16 bg-gradient-to-tr from-slate-700 to-slate-800 rounded-2xl mx-auto mb-3"
            ></div>
            <p class="text-sm font-bold">Sara K.</p>
            <p class="text-[10px] text-slate-400">HIIT Specialist</p>
          </div>
          <div class="min-w-[140px] glass p-4 rounded-3xl text-center">
            <div
              class="w-16 h-16 bg-gradient-to-tr from-slate-700 to-slate-800 rounded-2xl mx-auto mb-3"
            ></div>
            <p class="text-sm font-bold">Marco V.</p>
            <p class="text-[10px] text-slate-400">Powerlifting</p>
          </div>
        </div>
      </section>
    </main>

    <nav
      class="fixed bottom-6 left-6 right-6 h-16 glass rounded-2xl border border-white/10 flex justify-around items-center px-4 z-50"
    >
      <button class="nav-item active"><i data-lucide="layout-grid"></i></button>
      <button class="nav-item"><i data-lucide="calendar"></i></button>
      <button class="nav-item"><i data-lucide="dumbbell"></i></button>
      <button class="nav-item"><i data-lucide="settings"></i></button>
    </nav>

    <script src="script.js"></script>
  </body>
</html>
